name: Build DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      # TODO: Add code signing here

      - name: Prepare DMG contents
        run: |
          mkdir -p dmg-contents
          cp .build/release/parsec-vdd dmg-contents/
          cp README.md dmg-contents/ 2>/dev/null || true

      # TODO: Customize DMG appearance
      - name: Create DMG
        run: |
          hdiutil create \
            -volname "ParsecVDD" \
            -srcfolder dmg-contents \
            -ov \
            -format UDZO \
            ParsecVDD.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ParsecVDD-dmg
          path: ParsecVDD.dmg
